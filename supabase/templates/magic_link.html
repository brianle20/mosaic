<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Your Mosaic sign-in code</title>
  </head>
  <body style="margin:0; padding:0; background:#f7f4ec; color:#17211d; font-family:Arial, Helvetica, sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f7f4ec; padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:480px; background:#ffffff; border:1px solid #d6ded8; border-radius:8px; padding:32px;">
            <tr>
              <td style="font-size:13px; font-weight:700; letter-spacing:0.04em; color:#007b7f; text-transform:uppercase;">
                Mosaic Mahjong
              </td>
            </tr>
            <tr>
              <td style="padding-top:16px; font-size:24px; line-height:1.25; font-weight:700;">
                Your sign-in code
              </td>
            </tr>
            <tr>
              <td style="padding-top:12px; font-size:16px; line-height:1.5; color:#4f5f59;">
                Enter this code in Mosaic to finish signing in.
              </td>
            </tr>
            <tr>
              <td align="center" style="padding:28px 0;">
                <div style="display:inline-block; padding:16px 24px; border-radius:8px; background:#e9fbfc; border:1px solid #91dce0; color:#005f63; font-size:36px; line-height:1; font-weight:700; letter-spacing:0.18em;">
                  {{ .Token }}
                </div>
              </td>
            </tr>
            <tr>
              <td style="font-size:14px; line-height:1.5; color:#697772;">
                This code expires soon. If you did not request it, you can ignore this email.
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
