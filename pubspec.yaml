name: mosaic
description: Native mobile app for hosting casual mahjong events.
publish_to: none
version: 0.1.0+2

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  collection: ^1.19.1
  flutter_dotenv: ^5.2.1
  meta: ^1.16.0
  nfc_manager: ^4.2.1
  shared_preferences: ^2.5.3
  supabase_flutter: ^2.8.4
  mobile_scanner: ^7.2.0
  sqflite: ^2.4.2+1
  path: ^1.9.1
  path_provider: ^2.1.6
  uuid: ^4.5.3
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_lints: ^5.0.0
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - .env.mobile
